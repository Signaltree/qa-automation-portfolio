name: Appium Mobile Tests

on:
  push:
    branches: [main]
    paths: ['appium/**']
  pull_request:
    paths: ['appium/**']
  workflow_dispatch:

concurrency:
  group: appium-${{ github.ref }}
  cancel-in-progress: true

jobs:
  android-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        api-level: [34]
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Appium Server + UiAutomator2 Driver
        run: |
          npm install -g appium
          appium driver install uiautomator2

      - name: Download Wikipedia APK
        run: |
          mkdir -p app/build
          curl -sL -o app/build/wikipedia.apk \
            "https://github.com/wikimedia/apps-android-wikipedia/releases/download/latest/app-alpha-universal-release.apk"

      - name: Grant KVM access
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | \
            sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Start emulator + run tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: ${{ matrix.api-level }}
          target: google_apis
          arch: x86_64
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none -camera-front none
          disable-animations: true
          script: |
            # Start Appium in background
            appium --log-level info --port 4723 &
            APPIUM_PID=$!

            # Wait for Appium to be ready
            for i in $(seq 1 30); do
              if curl -s http://127.0.0.1:4723/wd/hub/status > /dev/null 2>&1; then
                echo "Appium ready"
                break
              fi
              echo "Waiting for Appium... ($i/30)"
              sleep 2
            done

            # Install APK
            echo "Installing Wikipedia APK..."
            adb install -r app/build/wikipedia.apk

            # Run tests
            echo "Running Appium tests..."
            cd appium
            mvn clean test -DappPath=../app/build/wikipedia.apk

            # Cleanup
            kill $APPIUM_PID 2>/dev/null || true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: appium-results-api-${{ matrix.api-level }}
          path: appium/target/
