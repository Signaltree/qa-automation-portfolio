name: Java Tests (Karate + REST Assured + BDD)

on:
  push:
    branches: [main]
    paths:
      - 'karate/**'
      - 'rest-assured/**'
      - 'bdd-cucumber/**'
  pull_request:
    branches: [main]

jobs:
  karate:
    name: Karate — API + Security + Load
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Run Karate API tests
        run: mvn test -f karate/pom.xml

      - name: Run Gatling load test (smoke)
        run: mvn gatling:test -Pload-test -f karate/pom.xml

      - name: Generate Karate Allure report
        if: always()
        run: mvn allure:report -f karate/pom.xml

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: karate-reports
          path: |
            karate/target/surefire-reports/
            karate/target/karate-reports/
          retention-days: 7

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: karate-allure-report
          path: karate/target/site/allure-maven-plugin/
          retention-days: 14

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: karate-gatling-results
          path: karate/target/gatling/
          retention-days: 7

  rest-assured:
    name: REST Assured — API Contract Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Run REST Assured tests
        run: mvn test -f rest-assured/pom.xml

      - name: Generate REST Assured Allure report
        if: always()
        run: mvn allure:report -f rest-assured/pom.xml

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: rest-assured-reports
          path: rest-assured/target/surefire-reports/
          retention-days: 7

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: rest-assured-allure-report
          path: rest-assured/target/site/allure-maven-plugin/
          retention-days: 14

  bdd-cucumber:
    name: Cucumber BDD — Selenium WebDriver
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Install system Chrome
        run: |
          wget -q -O - https://dl-ssl.google.com/linux/linux_signing_key.pub | sudo apt-key add -
          sudo sh -c 'echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main" >> /etc/apt/sources.list.d/google-chrome.list'
          sudo apt-get update -qq
          sudo apt-get install -y -qq google-chrome-stable

      - name: Run Cucumber BDD tests
        run: mvn test -f bdd-cucumber/pom.xml

      - name: Generate BDD Allure report
        if: always()
        run: mvn allure:report -f bdd-cucumber/pom.xml

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bdd-cucumber-reports
          path: bdd-cucumber/target/cucumber.html
          retention-days: 7

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bdd-cucumber-allure-report
          path: bdd-cucumber/target/site/allure-maven-plugin/
          retention-days: 14
